<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
  <link rel="stylesheet" href="css/qgis2web.css">
  <link rel="stylesheet" href="css/fontawesome-all.min.css">
  <link rel="stylesheet" href="css/leaflet.photon.css">

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }

    .spk-popup {
      width: 270px;
      font-family: Arial, Helvetica, sans-serif;
      color: #272727;
    }
    .spk-popup-title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 5px;
    }
    .spk-popup-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .spk-popup-function {
      font-size: 13px;
      color: #555;
      margin-bottom: 10px;
    }
    .spk-popup-photo {
      margin: 10px 0 11px;
      text-align: center;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .spk-popup-photo img {
      display: block;
      width: 100%;
      max-height: 210px;
      object-fit: contain;
      background: #f0f0f0;
    }
    .spk-popup-detail a {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 3px;
      background: #556f8e;
      color: #fff !important;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }
    .spk-popup-detail a:hover {
      background: #405a79;
    }
    .spk-popup-note {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
    }

    .leaflet-tooltip.css_Site_Point_9 {
      background: rgba(255,255,255,.78);
      border: 0;
      box-shadow: none;
      padding: 1px 3px;
      font: bold 8pt Arial, sans-serif;
      color: #323232;
    }
  </style>
  <title>Sambor Prei Kuk WebGIS</title>
</head>
<body>
<div id="map"></div>

<script src="js/qgis2web_expressions.js"></script>
<script src="js/leaflet.js"></script>
<script src="js/L.Control.Layers.Tree.min.js"></script>
<script src="js/leaflet.rotatedMarker.js"></script>
<script src="js/leaflet.pattern.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="js/Autolinker.min.js"></script>
<script src="js/rbush.min.js"></script>
<script src="js/labelgun.min.js"></script>
<script src="js/labels.js"></script>
<script src="js/leaflet.photon.js"></script>

<script src="data/BufferZone_1.js"></script>
<script src="data/River_2.js"></script>
<script src="data/Dike_3.js"></script>
<script src="data/Pond_4.js"></script>
<script src="data/Structure_line_5.js"></script>
<script src="data/Structurepolygon_6.js"></script>
<script src="data/Excavation_polygon_7.js"></script>
<script src="data/Excavation_line_1cm_8.js"></script>
<script src="data/Site_Point_9.js"></script>

<script>
(function () {
  'use strict';

  var map = L.map('map', {
    zoomControl: false,
    maxZoom: 25,
    minZoom: 1
  }).fitBounds([
    [12.855524066228302, 105.00919543495749],
    [12.888396566665433, 105.05715727727456]
  ]);

  new L.Hash(map);

  map.attributionControl.setPrefix(
    '<a href="https://github.com/qgis2web/qgis2web" target="_blank" rel="noopener">qgis2web</a>' +
    ' &middot; <a href="https://leafletjs.com" target="_blank" rel="noopener">Leaflet</a>' +
    ' &middot; <a href="https://qgis.org" target="_blank" rel="noopener">QGIS</a>'
  );

  L.control.zoom({ position: 'topleft' }).addTo(map);

  // ------------------------------------------------------------------
  // CSV loading: use the same data source as the Detail Pages.
  // ------------------------------------------------------------------
  function csvParse(text) {
    var rows = [], row = [], field = '', quoted = false;
    for (var i = 0; i < text.length; i++) {
      var c = text[i], n = text[i + 1];
      if (quoted) {
        if (c === '"' && n === '"') {
          field += '"';
          i++;
        } else if (c === '"') {
          quoted = false;
        } else {
          field += c;
        }
      } else {
        if (c === '"') quoted = true;
        else if (c === ',') {
          row.push(field);
          field = '';
        } else if (c === '\n') {
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
        } else if (c !== '\r') {
          field += c;
        }
      }
    }
    if (field.length || row.length) {
      row.push(field);
      rows.push(row);
    }
    if (!rows.length) return [];

    var headers = rows[0].map(function (h) {
      return h.replace(/^\uFEFF/, '').trim();
    });

    return rows.slice(1)
      .filter(function (r) {
        return r.some(function (v) { return String(v).trim() !== ''; });
      })
      .map(function (r) {
        var o = {};
        headers.forEach(function (h, j) {
          o[h] = (r[j] == null ? '' : r[j]).trim();
        });
        return o;
      });
  }

  function loadCsv(path) {
    return fetch(path, { cache: 'no-store' }).then(function (response) {
      if (!response.ok) throw new Error(path + ': HTTP ' + response.status);
      return response.text();
    }).then(csvParse);
  }

  function naturalOrder(value) {
    var n = Number(value);
    return isFinite(n) ? n : 999999;
  }

  var archiveDataPromise = Promise.all([
    loadCsv('detail_data/sites.csv'),
    loadCsv('detail_data/assets.csv')
  ]).then(function (result) {
    var sites = result[0];
    var assets = result[1];

    var siteById = {};
    var aliasToId = {};
    var leadPhotoBySite = {};

    sites.forEach(function (site) {
      var id = site.Site_ID;
      if (!id) return;
      siteById[id] = site;

      [site.Site_ID, site.Code, site.Display_No].forEach(function (alias) {
        if (alias) aliasToId[String(alias).trim()] = id;
      });
    });

    assets
      .filter(function (a) { return a.Asset_Type === 'current_photo' && a.Site_ID && a.File; })
      .sort(function (a, b) {
        var s = String(a.Site_ID).localeCompare(String(b.Site_ID), undefined, { numeric: true });
        if (s !== 0) return s;
        return naturalOrder(a.Display_Order) - naturalOrder(b.Display_Order);
      })
      .forEach(function (a) {
        if (!leadPhotoBySite[a.Site_ID]) leadPhotoBySite[a.Site_ID] = a.File;
      });

    return {
      siteById: siteById,
      aliasToId: aliasToId,
      leadPhotoBySite: leadPhotoBySite
    };
  }).catch(function (err) {
    console.error('Could not load archive CSV data:', err);
    return { siteById: {}, aliasToId: {}, leadPhotoBySite: {} };
  });

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function valueOf(props, names) {
    for (var i = 0; i < names.length; i++) {
      var value = props[names[i]];
      if (value !== null && value !== undefined) {
        value = String(value).trim();
        if (value && value.toLowerCase() !== 'null' && value.toLowerCase() !== 'none') {
          return value;
        }
      }
    }
    return '';
  }

  function idFromDetailUrl(url) {
    if (!url) return '';
    var match = String(url).match(/\/?([^\/?#]+)\.html(?:[?#].*)?$/i);
    return match ? decodeURIComponent(match[1]) : '';
  }

  function resolveSiteId(props, archive) {
    var candidates = [
      valueOf(props, ['csv_Site_ID']),
      valueOf(props, ['Site_ID']),
      valueOf(props, ['site_id']),
      valueOf(props, ['Code']),
      valueOf(props, ['csv_Code']),
      idFromDetailUrl(valueOf(props, ['csv_Detail_web', 'Detail_web', 'Detail_URL']))
    ].filter(Boolean);

    for (var i = 0; i < candidates.length; i++) {
      if (archive.siteById[candidates[i]]) return candidates[i];
      if (archive.aliasToId[candidates[i]]) return archive.aliasToId[candidates[i]];
    }
    return candidates.length ? candidates[0] : '';
  }

  function buildPopup(feature, archive) {
    var props = feature.properties || {};
    var siteId = resolveSiteId(props, archive);
    var site = archive.siteById[siteId] || {};

    var displayNo = valueOf(props, ['Display_No']) || site.Display_No || siteId;
    var name = valueOf(props, ['Name']) || site.Name || '';
    var func = valueOf(props, ['Function']) || site.Function || '';

    var photoFile = archive.leadPhotoBySite[siteId] || '';
    var detailUrl = siteId ? ('details/' + encodeURIComponent(siteId) + '.html') :
      valueOf(props, ['csv_Detail_web', 'Detail_web', 'Detail_URL']);

    var html = '<div class="spk-popup">';
    html += '<div class="spk-popup-title">' + escapeHtml(displayNo || siteId || 'Site') + '</div>';

    if (name && name.toLowerCase() !== 'no name') {
      html += '<div class="spk-popup-name">' + escapeHtml(name) + '</div>';
    }
    if (func) {
      html += '<div class="spk-popup-function">' + escapeHtml(func) + '</div>';
    }
    if (photoFile) {
      html += '<div class="spk-popup-photo">' +
        '<img src="' + escapeHtml(photoFile) + '" alt="' + escapeHtml(displayNo) + '"' +
        ' onerror="this.parentNode.style.display=\'none\';">' +
        '</div>';
    }
    if (detailUrl) {
      html += '<div class="spk-popup-detail">' +
        '<a href="' + escapeHtml(detailUrl) + '" target="_blank" rel="noopener noreferrer">' +
        '<i class="fas fa-external-link-alt" aria-hidden="true"></i> Detail Web</a>' +
        '</div>';
    }
    html += '</div>';
    return html;
  }

  // ------------------------------------------------------------------
  // Background / archaeology layers
  // ------------------------------------------------------------------
  map.createPane('pane_LiDAR_Terrain2m_0');
  map.getPane('pane_LiDAR_Terrain2m_0').style.zIndex = 400;
  var layer_LiDAR_Terrain2m_0 = L.imageOverlay(
    'data/LiDAR_Terrain2m_0.png',
    [[12.82581614706117, 104.973254239375], [12.933794440391019, 105.11552386189315]],
    { pane: 'pane_LiDAR_Terrain2m_0' }
  ).addTo(map);

  function addGeoJsonLayer(data, paneName, zIndex, style) {
    map.createPane(paneName);
    map.getPane(paneName).style.zIndex = zIndex;
    map.getPane(paneName).style['mix-blend-mode'] = 'normal';
    return L.geoJson(data, {
      pane: paneName,
      interactive: false,
      style: style
    }).addTo(map);
  }

  var layer_BufferZone_1 = addGeoJsonLayer(json_BufferZone_1, 'pane_BufferZone_1', 401, {
    color: 'rgba(72,123,182,1)', weight: 3, fillOpacity: 0
  });

  var layer_River_2 = addGeoJsonLayer(json_River_2, 'pane_River_2', 402, {
    color: 'rgba(34,21,231,1)', weight: 1, fillOpacity: 0
  });

  var layer_Dike_3 = addGeoJsonLayer(json_Dike_3, 'pane_Dike_3', 403, {
    color: 'rgba(35,35,35,1)', weight: 1,
    fill: true, fillColor: 'rgba(155,105,43,1)', fillOpacity: 1
  });

  var layer_Pond_4 = addGeoJsonLayer(json_Pond_4, 'pane_Pond_4', 404, {
    color: 'rgba(35,35,35,1)', weight: 1,
    fill: true, fillColor: 'rgba(124,213,221,1)', fillOpacity: 1
  });

  var layer_Structure_line_5 = addGeoJsonLayer(json_Structure_line_5, 'pane_Structure_line_5', 405, {
    color: 'rgba(0,0,0,1)', weight: 1, fillOpacity: 0
  });

  var layer_Structurepolygon_6 = addGeoJsonLayer(json_Structurepolygon_6, 'pane_Structurepolygon_6', 406, {
    color: 'rgba(35,35,35,1)', weight: 1,
    fill: true, fillColor: 'rgba(0,0,0,1)', fillOpacity: 1
  });

  var layer_Excavation_polygon_7 = addGeoJsonLayer(json_Excavation_polygon_7, 'pane_Excavation_polygon_7', 407, {
    color: 'rgba(35,35,35,1)', weight: 1,
    fill: true, fillColor: 'rgba(0,0,0,1)', fillOpacity: 1
  });

  var layer_Excavation_line_1cm_8 = addGeoJsonLayer(json_Excavation_line_1cm_8, 'pane_Excavation_line_1cm_8', 408, {
    color: 'rgba(98,56,31,1)', weight: 1, fillOpacity: 0
  });

  // ------------------------------------------------------------------
  // Site points
  // ------------------------------------------------------------------
  function siteStyle(feature) {
    var importance = String((feature.properties || {}).Importance || '');
    var common = {
      pane: 'pane_Site_Point_9',
      opacity: 1,
      weight: 2,
      fill: true,
      fillOpacity: 1,
      interactive: true
    };

    var redStroke = 'rgba(128,17,25,1)';
    var redFill = 'rgba(219,30,42,1)';
    var greenStroke = 'rgba(61,128,53,1)';
    var greenFill = 'rgba(84,176,74,1)';

    if (importance === 'A1') return Object.assign({}, common, { radius: 8.4, color: redStroke, fillColor: redFill });
    if (importance === 'A2') return Object.assign({}, common, { radius: 6.0, color: redStroke, fillColor: redFill });
    if (importance === 'A3') return Object.assign({}, common, { radius: 4.4, color: redStroke, fillColor: redFill });
    if (importance === 'A4') return Object.assign({}, common, { radius: 3.2, color: redStroke, fillColor: redFill });
    if (importance === 'B1') return Object.assign({}, common, { radius: 6.0, color: greenStroke, fillColor: greenFill });
    if (importance === 'B2') return Object.assign({}, common, { radius: 4.4, color: greenStroke, fillColor: greenFill });
    return Object.assign({}, common, { radius: 3.6, color: greenStroke, fillColor: greenFill });
  }

  map.createPane('pane_Site_Point_9');
  map.getPane('pane_Site_Point_9').style.zIndex = 409;

  var layer_Site_Point_9 = L.geoJson(json_Site_Point_9, {
    pane: 'pane_Site_Point_9',
    interactive: true,
    pointToLayer: function (feature, latlng) {
      return L.circleMarker(latlng, siteStyle(feature));
    },
    onEachFeature: function (feature, layer) {
      var preliminary = '<div class="spk-popup"><div class="spk-popup-title">' +
        escapeHtml(valueOf(feature.properties || {}, ['Display_No']) || 'Site') +
        '</div></div>';

      layer.bindPopup(preliminary, { maxWidth: 320, maxHeight: 520 });

      layer.on('click', function () {
        archiveDataPromise.then(function (archive) {
          layer.setPopupContent(buildPopup(feature, archive));
          if (layer.isPopupOpen()) layer.getPopup().update();
        });
      });

      var label = valueOf(feature.properties || {}, ['Display_No']);
      if (label) {
        layer.bindTooltip(escapeHtml(label), {
          permanent: true,
          offset: [0, -16],
          className: 'css_Site_Point_9',
          direction: 'center'
        });
      }
    }
  }).addTo(map);

  // ------------------------------------------------------------------
  // Layer list
  // ------------------------------------------------------------------
  var siteLegend =
    'Site_Point<br /><table>' +
    '<tr><td style="text-align:center"><img src="legend/Site_Point_9_TempleComplex0.png"></td><td>Temple Complex</td></tr>' +
    '<tr><td style="text-align:center"><img src="legend/Site_Point_9_ShrinewithinComplex1.png"></td><td>Shrine within Complex</td></tr>' +
    '<tr><td style="text-align:center"><img src="legend/Site_Point_9_RuinedShrinewithinComplex2.png"></td><td>Ruined Shrine within Complex</td></tr>' +
    '<tr><td style="text-align:center"><img src="legend/Site_Point_9_OtherStructurewithinComplex3.png"></td><td>Other Structure within Complex</td></tr>' +
    '<tr><td style="text-align:center"><img src="legend/Site_Point_9_IndependentShrine4.png"></td><td>Independent Shrine</td></tr>' +
    '<tr><td style="text-align:center"><img src="legend/Site_Point_9_RuinedIndependentStructure5.png"></td><td>Ruined Independent Structure</td></tr>' +
    '<tr><td style="text-align:center"><img src="legend/Site_Point_9_MoundStructuralRemains6.png"></td><td>Mound / Structural Remains</td></tr>' +
    '</table>';

  var overlaysTree = [
    { label: siteLegend, layer: layer_Site_Point_9 },
    { label: '<img src="legend/Excavation_line_1cm_8.png"> Excavation_line_1cm', layer: layer_Excavation_line_1cm_8 },
    { label: '<img src="legend/Excavation_polygon_7.png"> Excavation_polygon', layer: layer_Excavation_polygon_7 },
    { label: '<img src="legend/Structurepolygon_6.png"> Structure polygon', layer: layer_Structurepolygon_6 },
    { label: '<img src="legend/Structure_line_5.png"> Structure_line', layer: layer_Structure_line_5 },
    { label: '<img src="legend/Pond_4.png"> Pond', layer: layer_Pond_4 },
    { label: '<img src="legend/Dike_3.png"> Dike', layer: layer_Dike_3 },
    { label: '<img src="legend/River_2.png"> River', layer: layer_River_2 },
    { label: '<img src="legend/BufferZone_1.png"> BufferZone', layer: layer_BufferZone_1 },
    { label: 'LiDAR_Terrain (2m)', layer: layer_LiDAR_Terrain2m_0 }
  ];

  L.control.layers.tree(null, overlaysTree, {
    collapsed: false
  }).addTo(map);

})();
</script>
</body>
</html>
