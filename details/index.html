<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Sambor Prei Kuk Monument Archive">
  <title>Sambor Prei Kuk: Monument Archive</title>
  <style>
    :root{
      --ink:#272421; --muted:#746f68; --line:#d8d1c7; --paper:#f7f4ef;
      --card:#ffffff; --accent:#6c5a44; --max:1120px;
      --header1:#6f604f; --header2:#8b7862; --header3:#5f5144;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--paper);color:var(--ink);
      font-family:Georgia,"Times New Roman",serif;line-height:1.65}
    a{color:inherit}
    .page{max-width:var(--max);margin:0 auto;background:var(--card);min-height:100vh;
      box-shadow:0 0 36px rgba(40,34,28,.08)}
    header{
      padding:38px 48px 28px;
      border-bottom:1px solid rgba(255,255,255,.22);
      background:linear-gradient(135deg,var(--header3) 0%,var(--header1) 48%,var(--header2) 100%);
      color:#fff;
    }
    .eyebrow{font-family:Arial,sans-serif;font-size:.76rem;letter-spacing:.18em;
      text-transform:uppercase;color:rgba(255,255,255,.82);font-weight:700}
    h1{font-size:clamp(2.2rem,5vw,4.8rem);line-height:1.02;margin:.35rem 0 .55rem;font-weight:500}
    .subtitle{font-size:1.15rem;color:rgba(255,255,255,.88);margin:0}
    main{padding:38px 48px 58px}
    section{margin-top:44px}
    section:first-child{margin-top:0}
    h2{font-size:1.45rem;font-weight:500;margin:0 0 18px;padding-bottom:8px;border-bottom:1px solid var(--line)}
    .hero img{display:block;width:100%;max-height:760px;object-fit:contain;background:#fff}
    .caption{font-family:Arial,sans-serif;font-size:.82rem;color:var(--muted);margin-top:7px}
    .info{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border-top:1px solid var(--line)}
    .info-row{display:grid;grid-template-columns:145px 1fr;gap:16px;padding:10px 0;border-bottom:1px solid var(--line)}
    .info-row:nth-child(odd){padding-right:24px}
    .label{font-family:Arial,sans-serif;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
    .value{min-width:0}
    .description{font-size:1.06rem;white-space:pre-line}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    figure{margin:0}
    figure img{width:100%;display:block;max-height:420px;object-fit:contain;background:#fff}
    .asset-link{display:block;text-decoration:none}
    .model-frame{width:100%;aspect-ratio:16/9;border:0;background:#111}
    .model-link{display:inline-block;margin-top:10px;font-family:Arial,sans-serif;font-size:.9rem}
    .old-pair{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:14px;border:1px solid var(--line);background:#fff}
    .old-pair.single{grid-template-columns:1fr}
    .old-photo-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .pair-label{font-family:Arial,sans-serif;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
    .notice{padding:18px;border:1px solid var(--line);background:#faf8f4;font-family:Arial,sans-serif}
    footer{
      border-top:1px solid rgba(255,255,255,.18);
      padding:28px 48px 40px;
      color:rgba(255,255,255,.82);
      font-size:.88rem;
      background:linear-gradient(135deg,var(--header3) 0%,var(--header1) 48%,var(--header2) 100%);
    }
    footer strong{color:#fff;font-weight:600}
    .hidden{display:none!important}
    @media (max-width:980px){
      .grid,.grid.three,.old-photo-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:760px){
      header,main,footer{padding-left:22px;padding-right:22px}
      .grid,.grid.three,.old-photo-grid,.info,.old-pair{grid-template-columns:1fr}
      .info-row:nth-child(odd){padding-right:0}
      .info-row{grid-template-columns:120px 1fr}
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="eyebrow">Sambor Prei Kuk: Monument Archive</div>
    <h1 id="title">Loading…</h1>
    <p id="subtitle" class="subtitle"></p>
  </header>
  <main id="content"><div class="notice">Loading archive data…</div></main>
  <footer>
    <strong>Sambor Prei Kuk Conservation Project</strong><br>
    National Authority for Sambor Prei Kuk – Lab. of Architectural Heritage, Univ. of Tsukuba
  </footer>
</div>

<script>
(() => {
  const DATA_ROOT = '../detail_data/';
  const ASSET_ROOT = '../';

  function csvParse(text){
    const rows=[]; let row=[], field='', quoted=false;
    for(let i=0;i<text.length;i++){
      const c=text[i], n=text[i+1];
      if(quoted){
        if(c === '"' && n === '"'){ field+='"'; i++; }
        else if(c === '"'){ quoted=false; }
        else field+=c;
      }else{
        if(c === '"') quoted=true;
        else if(c === ','){ row.push(field); field=''; }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else if(c !== '\r') field+=c;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    if(!rows.length) return [];
    const headers=rows[0].map(h=>h.replace(/^\uFEFF/,'').trim());
    return rows.slice(1).filter(r=>r.some(v=>String(v).trim()!=='')).map(r=>{
      const o={}; headers.forEach((h,j)=>o[h]=(r[j]??'').trim()); return o;
    });
  }

  async function loadCsv(name){
    const r=await fetch(DATA_ROOT+name,{cache:'no-store'});
    if(!r.ok) throw new Error(`${name}: HTTP ${r.status}`);
    return csvParse(await r.text());
  }

  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const present=v=>v!==undefined && v!==null && String(v).trim()!=='' && String(v).trim().toLowerCase()!=='none';
  const order=a=>Number(a.Display_Order||999999);
  const assetUrl=p=>ASSET_ROOT + String(p||'').replace(/^\/+/,'');
  const fileName=p=>String(p||'').split('/').pop();
  const pairId=p=>{ const m=fileName(p).match(/(?:OP|NP)_(\d+)/i); return m?m[1]:fileName(p); };

  function sketchfabEmbed(url){
    if(!url) return '';
    const m=url.match(/3d-models\/[^/]*-([a-f0-9]{32})(?:[/?#]|$)/i);
    return m ? `https://sketchfab.com/models/${m[1]}/embed?autostart=0&ui_theme=dark` : '';
  }

  function figure(a, fallback){
    const cap=present(a.Caption)?a.Caption:fallback;
    return `<figure><a class="asset-link" href="${esc(assetUrl(a.File))}" target="_blank" rel="noopener">
      <img src="${esc(assetUrl(a.File))}" alt="${esc(cap||'Archive image')}" loading="lazy"></a>
      ${cap?`<figcaption class="caption">${esc(cap)}</figcaption>`:''}</figure>`;
  }

  function infoRow(label,value){
    return present(value)?`<div class="info-row"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`:'';
  }

  function section(title,body){
    return body?`<section><h2>${esc(title)}</h2>${body}</section>`:'';
  }

  function renderOldPhotos(oldPhotos,newPhotos){
    const oldMap=new Map(oldPhotos.map(x=>[pairId(x.File),x]));
    const newMap=new Map(newPhotos.map(x=>[pairId(x.File),x]));
    const ids=[...new Set([...oldMap.keys(),...newMap.keys()])].sort((a,b)=>Number(a)-Number(b));
    return ids.map(id=>{
      const op=oldMap.get(id), np=newMap.get(id);
      const cols=[];
      if(op) cols.push(`<div><div class="pair-label">Old photograph</div>${figure(op,op.Caption||`OP_${id}`)}</div>`);
      if(np) cols.push(`<div><div class="pair-label">Current comparison</div>${figure(np,np.Caption||`NP_${id}`)}</div>`);
      return `<div class="old-pair ${cols.length===1?'single':''}">${cols.join('')}</div>`;
    }).join('');
  }

  async function main(){
    const params=new URLSearchParams(location.search);
    let id=params.get('id');
    if(!id){
      const leaf=decodeURIComponent(location.pathname.split('/').pop()||'').replace(/\.html$/i,'');
      if(leaf && leaf.toLowerCase()!=='index') id=leaf;
    }
    if(!id) throw new Error('No Site_ID was specified.');

    const [sites,assets,stones]=await Promise.all([
      loadCsv('sites.csv'), loadCsv('assets.csv'), loadCsv('stone_objects.csv')
    ]);
    const site=sites.find(s=>s.Site_ID===id);
    if(!site) throw new Error(`Site_ID "${id}" was not found in sites.csv.`);

    const parent=sites.find(s=>s.Site_ID===site.Parent_ID);
    const a=assets.filter(x=>x.Site_ID===id).sort((x,y)=>order(x)-order(y));
    const current=a.filter(x=>x.Asset_Type==='current_photo');
    const drawings=a.filter(x=>x.Asset_Type==='drawing');
    const models=a.filter(x=>x.Asset_Type==='3d_model');
    const oldPhotos=a.filter(x=>x.Asset_Type==='old_photo');
    const newPhotos=a.filter(x=>x.Asset_Type==='new_photo');
    const objects=stones.filter(x=>x.Site_ID===id).sort((x,y)=>order(x)-order(y));

    let title, subtitle='';
    if(site.Importance==='A1'){
      title=present(site.Name)?site.Name:(site.Display_No||site.Site_ID);
    }else if(/^A[2-4]$/.test(site.Importance)){
      title=site.Display_No||site.Site_ID;
      const parentName=parent && present(parent.Name) ? parent.Name : '';
      const second=present(site.Name)?site.Name:parentName;
      subtitle=[site.Function,second].filter(present).join(', ');
    }else{
      title=site.Display_No||site.Site_ID;
      subtitle=present(site.Composition)?site.Composition:(site.Name||'');
    }

    document.title=`${title} | Sambor Prei Kuk Monument Archive`;
    document.getElementById('title').textContent=title;
    const sub=document.getElementById('subtitle');
    sub.textContent=subtitle; if(!subtitle) sub.classList.add('hidden');

    let html='';
    if(current.length){
      html+=`<section class="hero">${figure(current[0],current[0].Caption||'')}</section>`;
    }

    // Basic Information
    let info='';
    if(site.Importance==='A1'){
      info+=infoRow('CISARK No.',site.CISARK_No);
      info+=infoRow('Building Type',site.Building_Type_Label);
      info+=infoRow('Composition',site.Composition);
      info+=infoRow('Condition',site.Condition);
      info+=infoRow('Inscription',site.Inscription);
      info+=infoRow('UTM (East)',site.UTM_E);
      info+=infoRow('UTM (North)',site.UTM_N);
    }else if(/^A[2-4]$/.test(site.Importance)){
      info+=infoRow('Building Type',site.Building_Type_Label);
      info+=infoRow('Condition',site.Condition);
      info+=infoRow('Stone object',site.Stone_object);
      info+=infoRow('Inscription',site.Inscription);
      info+=infoRow('UTM (East)',site.UTM_E);
      info+=infoRow('UTM (North)',site.UTM_N);
    }else{
      info+=infoRow('CISARK No.',site.CISARK_No);
      info+=infoRow('Building Type',site.Building_Type_Label);
      info+=infoRow('Condition',site.Condition);
      info+=infoRow('Setting',site.Stand_in);
      info+=infoRow('Stone object',site.Stone_object);
      info+=infoRow('Inscription',site.Inscription);
      info+=infoRow('UTM (East)',site.UTM_E);
      info+=infoRow('UTM (North)',site.UTM_N);
    }
    html+=section('Basic Information',info?`<div class="info">${info}</div>`:'');

    if(present(site.Description)) html+=section('Description',`<div class="description">${esc(site.Description)}</div>`);

    // Multiple current photos for every type, including A1.
    if(current.length>1){
      html+=section('Photos',`<div class="grid">${current.slice(1).map((x,i)=>figure(x,x.Caption||`Photo ${i+2}`)).join('')}</div>`);
    }

    if(models.length){
      const modelHtml=models.map((m,i)=>{
        const embed=sketchfabEmbed(m.External_URL);
        const label=present(m.Caption)?m.Caption:`3D Model ${i+1}`;
        return `<div>${embed?`<iframe class="model-frame" src="${esc(embed)}" allow="autoplay; fullscreen; xr-spatial-tracking" allowfullscreen loading="lazy"></iframe>`:''}
          ${m.External_URL?`<a class="model-link" href="${esc(m.External_URL)}" target="_blank" rel="noopener">Open ${esc(label)} in Sketchfab ↗</a>`:''}</div>`;
      }).join('');
      html+=section('3D Model',modelHtml);
    }

    if(drawings.length){
      html+=section('Drawings',`<div class="grid">${drawings.map((x,i)=>figure(x,x.Caption||`Drawing ${i+1}`)).join('')}</div>`);
    }

    if(objects.length){
      html+=section('Stone Objects',`<div class="grid three">${objects.map((x,i)=>figure(x,x.Caption||x.Item||`Artifact ${i+1}`)).join('')}</div>`);
    }

    if(oldPhotos.length || newPhotos.length){
      html+=section('Old Photographs',`<div class="old-photo-grid">${renderOldPhotos(oldPhotos,newPhotos)}</div>`);
    }

    if(!html) html='<div class="notice">No displayable content is registered for this record.</div>';
    document.getElementById('content').innerHTML=html;
  }

  main().catch(err=>{
    document.getElementById('title').textContent='Archive page unavailable';
    document.getElementById('content').innerHTML=`<div class="notice">${esc(err.message)}</div>`;
    console.error(err);
  });
})();
</script>
</body>
</html>
